# Site settings
title: Operator! Documentation
description: Documentation for Operator! - combining kanban workflows with LLM tools
url: "https://operator.untra.io"
baseurl: ""

# Social/SEO
# 1200x630 social card (raster PNG — SVG is not rendered by social unfurlers).
# Also set in `defaults` below because jekyll-seo-tag emits og:image from
# page.image, not site.image.
image: /assets/img/operator_og.png
twitter:
  card: summary_large_image

# GitHub repository
github:
  repo: "https://github.com/untra/operator"
  author: "https://github.com/untra"

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - typescript

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "doc"
      image: /assets/img/operator_og.png

# Collections
collections_dir: .

# Permalink structure
permalink: pretty
version: 0.2.1

# Google Analytics
ga_tag: G-5JZPJWWT7S  # Replace with actual GA4 measurement ID from analytics.google.com
