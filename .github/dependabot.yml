version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns: ["*"]
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 3

  - package-ecosystem: cargo
    directory: "/opr8r"
    schedule:
      interval: weekly
    groups:
      opr8r-deps:
        patterns: ["*"]
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 3

  - package-ecosystem: cargo
    directory: "/zed-extension"
    schedule:
      interval: weekly
    groups:
      zed-deps:
        patterns: ["*"]
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 3

  - package-ecosystem: npm
    directory: "/vscode-extension"
    schedule:
      interval: weekly
    groups:
      vscode-deps:
        patterns: ["*"]
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 3

  - package-ecosystem: bundler
    directory: "/docs"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 3

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    ignore:
      - dependency-name: "actions/*"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 14
      semver-patch-days: 3
